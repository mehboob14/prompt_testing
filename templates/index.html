<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <h1 class="title">{{ title }}</h1>

      <button id="newChatBtn" type="button" class="newChatTopBtn">New Chat</button>

      <section class="controls">
        <label>
          Model (OpenRouter)
          <select id="modelSelect">
            <option value="{{ default_model }}">Default: {{ default_model }}</option>

            <optgroup label="Meta / Llama">
              <option value="meta-llama/llama-3.1-8b-instruct">Llama 3.1 8B Instruct</option>
              <option value="meta-llama/llama-3.1-70b-instruct">Llama 3.1 70B Instruct</option>
              <option value="meta-llama/llama-3.2-3b-instruct">Llama 3.2 3B Instruct</option>
              <option value="meta-llama/llama-3.2-11b-vision-instruct">Llama 3.2 11B Vision Instruct</option>
              <option value="meta-llama/llama-4-scout">Meta: Llama 4 Scout ($0.08 in / $0.30 out)</option>
              <option value="llama-3.3-70b-versatile">GROQ: llama-3.3-70b-versatile ($0.00 in / $0.00 out)</option>
            </optgroup>

            <optgroup label="Qwen">
              <option value="qwen/qwen-2.5-72b-instruct">Qwen 2.5 72B Instruct</option>
              <option value="qwen/qwen3-32b">Qwen: Qwen3 32B ($0.08 in / $0.24 out)</option>
              <option value="qwen/qwen3-30b-a3b">Qwen: Qwen3 30B A3B ($0.08 in / $0.28 out)</option>
              <option value="qwen/qwen3-30b-a3b-instruct-2507">Qwen: Qwen3 30B A3B Instruct 2507 ($0.09 in / $0.30 out)</option>
              <option value="qwen/qwen3-vl-30b-a3b-thinking:free">Qwen: Qwen3 VL 30B A3B Thinking ($0.00 in / $0.00 out)</option>
              <option value="qwen/qwen3-vl-235b-a22b-thinking:free">Qwen: Qwen3 VL 235B A22B Thinking ($0.00 in / $0.00 out)</option>
            </optgroup>

            <optgroup label="DeepSeek">
              <option value="deepseek/deepseek-r1">DeepSeek R1</option>
              <option value="deepseek/deepseek-chat">DeepSeek Chat</option>
            </optgroup>

            <optgroup label="OpenAI">
              <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
              <option value="openai/gpt-oss-safeguard-20b">OpenAI: gpt-oss-safeguard-20b ($0.075 in / $0.30 out)</option>
            </optgroup>

            <optgroup label="Anthropic">
              <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
            </optgroup>

            <optgroup label="Google">
              <option value="google/gemini-2.0-flash-lite-001">Google: Gemini 2.0 Flash Lite ($0.075 in / $0.30 out)</option>
            </optgroup>

            <optgroup label="Mistral">
              <option value="mistralai/ministral-3b-2512">Mistral: Ministral 3 3B 2512 ($0.10 in / $0.10 out)</option>
              <option value="mistralai/mistral-7b-instruct-v0.1">Mistral: Mistral 7B Instruct v0.1 ($0.11 in / $0.19 out)</option>
            </optgroup>

            <optgroup label="StepFun">
              <option value="stepfun/step-3.5-flash">StepFun: Step 3.5 Flash ($0.10 in / $0.30 out)</option>
              <option value="stepfun/step-3.5-flash:free">StepFun: Step 3.5 Flash ($0.00 in / $0.00 out)</option>
            </optgroup>

            <optgroup label="Arcee AI">
              <option value="arcee-ai/trinity-large-preview:free">Arcee AI: Trinity Large Preview ($0.00 in / $0.00 out)</option>
              <option value="arcee-ai/trinity-mini:free">Arcee AI: Trinity Mini ($0.00 in / $0.00 out)</option>
            </optgroup>

            <optgroup label="LiquidAI">
              <option value="liquidai/lfm2.5-1.2b-thinking:free">LiquidAI: LFM2.5-1.2B-Thinking ($0.00 in / $0.00 out)</option>
              <option value="liquidai/lfm2.5-1.2b-instruct:free">LiquidAI: LFM2.5-1.2B-Instruct ($0.00 in / $0.00 out)</option>
            </optgroup>

            <optgroup label="NVIDIA">
              <option value="nvidia/nemotron-3-nano-30b-a3b:free">NVIDIA: Nemotron 3 Nano 30B A3B ($0.00 in / $0.00 out)</option>
              <option value="nvidia/nemotron-nano-12b-2-vl:free">NVIDIA: Nemotron Nano 12B 2 VL ($0.00 in / $0.00 out)</option>
            </optgroup>

            <optgroup label="Z.ai">
              <option value="z-ai/glm-4.7-flash">Z.ai: GLM 4.7 Flash ($0.06 in / $0.40 out)</option>
              <option value="z-ai/glm-4-32b">Z.ai: GLM 4 32B ($0.10 in / $0.10 out)</option>
            </optgroup>

            <optgroup label="ByteDance">
              <option value="bytedance-seed/seed-1.6-flash">ByteDance Seed: Seed 1.6 Flash ($0.075 in / $0.30 out)</option>
              <option value="bytedance/ui-tars-7b">ByteDance: UI-TARS 7B ($0.10 in / $0.20 out)</option>
            </optgroup>

            <optgroup label="Xiaomi">
              <option value="xiaomi/mimo-v2-flash">Xiaomi: MiMo-V2-Flash ($0.09 in / $0.29 out)</option>
            </optgroup>

            <optgroup label="AllenAI">
              <option value="allenai/olmo-3-7b-instruct">AllenAI: Olmo 3 7B Instruct ($0.10 in / $0.20 out)</option>
            </optgroup>
          </select>
        </label>

        <label>
          System Prompt
          <textarea id="systemPrompt" rows="3" autocomplete="off">{{ default_system_prompt }}</textarea>
        </label>
      </section>

      <form id="chatForm" class="inputForm">
        <label>
          Prompt
          <textarea id="message" rows="6" placeholder="Type your prompt..." autocomplete="off"></textarea>
        </label>

        <label>
          Attach File (Image, PDF, etc.)
          <input type="file" id="fileInput" accept="image/*,.pdf,.txt,.doc,.docx" />
        </label>
        <div id="filePreview" class="filePreview"></div>

        <button type="submit">Send</button>
      </form>
    </aside>

    <section class="content">
      <section id="chat" class="chat"></section>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
