<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <h1 class="title">{{ title }}</h1>

      <button id="newChatBtn" type="button" class="newChatTopBtn">New Chat</button>

      <section class="controls">
        <label>
          Model (OpenRouter)
          <select id="modelSelect">
            <option value="{{ default_model }}">Default: {{ default_model }}</option>

            <optgroup label="Llama">
              <option value="meta-llama/llama-3.1-8b-instruct">Llama 3.1 8B Instruct</option>
              <option value="meta-llama/llama-3.1-70b-instruct">Llama 3.1 70B Instruct</option>
              <option value="meta-llama/llama-3.2-3b-instruct">Llama 3.2 3B Instruct</option>
              <option value="meta-llama/llama-3.2-11b-vision-instruct">Llama 3.2 11B Vision Instruct</option>
            </optgroup>

            <optgroup label="Groq">
              <option value="llama-3.3-70b-versatile">GROQ Free: llama-3.3-70b-versatile</option>
            </optgroup>

            <optgroup label="OpenRouter Other">
              <option value="deepseek/deepseek-r1">DeepSeek R1</option>
              <option value="deepseek/deepseek-chat">DeepSeek Chat</option>
              <option value="qwen/qwen-2.5-72b-instruct">Qwen 2.5 72B Instruct</option>
              <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
              <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
            </optgroup>
          </select>
        </label>

        <label>
          System Prompt
          <textarea id="systemPrompt" rows="3" autocomplete="off">{{ default_system_prompt }}</textarea>
        </label>
      </section>

      <form id="chatForm" class="inputForm">
        <label>
          Prompt
          <textarea id="message" rows="6" placeholder="Type your prompt..." autocomplete="off"></textarea>
        </label>

        <label>
          Attach File (Image, PDF, etc.)
          <input type="file" id="fileInput" accept="image/*,.pdf,.txt,.doc,.docx" />
        </label>
        <div id="filePreview" class="filePreview"></div>

        <button type="submit">Send</button>
      </form>
    </aside>

    <section class="content">
      <section id="chat" class="chat"></section>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
